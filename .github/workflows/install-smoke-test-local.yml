name: Install smoke test (local models)

on:
  workflow_dispatch:

jobs:
  smoke-test-local:
    name: macos-26-xlarge / local inference
    runs-on: macos-26-xlarge

    env:
      USE_LOCAL_MODELS: "1"
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      MODEL_ROUTER_GITHUB_REF: ${{ github.event.pull_request.head.sha || github.sha }}

    steps:
      - uses: actions/checkout@v7

      - name: Cache pip downloads
        uses: actions/cache@v6
        with:
          path: ~/Library/Caches/pip
          key: pip-${{ runner.os }}-${{ hashFiles('install-model-router.sh') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Cache HuggingFace model
        uses: actions/cache@v6
        with:
          path: ~/.cache/huggingface/hub
          key: hf-Qwen3-8B-4bit

      - name: Run install (stdin simulation — mirrors curl | bash)
        run: bash <(cat install-model-router.sh) --mode A --local all --model mlx-community/Qwen3-8B-4bit

      - name: Verify bundle files exist
        run: |
          test -f ~/model-router/router_config.json
          test -f ~/model-router/model-router.env
          test -f ~/model-router/install-model-router.sh
          test -f ~/model-router/router.py
          test -f ~/model-router/mcp-local.json

      - name: Verify router_config.json has 4 routes
        run: |
          python3 - <<'PY'
          import json, os
          r = json.load(open(os.path.expanduser('~/model-router/router_config.json')))
          n = len(r.get('routes', []))
          assert n == 4, f'expected 4 routes, got {n}'
          print(f'OK: {n} routes found')
          PY

      - name: Verify .zshrc block was written
        run: |
          grep -q 'claude-router'        ~/.zshrc
          grep -q 'claude model routing' ~/.zshrc
          echo "OK: .zshrc block present"

      - name: Verify venv and packages
        run: |
          test -x ~/model-router/venv/bin/python
          ~/model-router/venv/bin/python -c "import fastapi, uvicorn, httpx; print('OK: packages present')"

      - name: Start model router stack
        run: bash ~/model-router/start-model-router.sh &

      - name: Wait for router to be ready
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:8771/health && break
            sleep 5
          done
          curl -sf http://localhost:8771/health || { echo "ERROR: router not ready after 5 min"; exit 1; }

      - name: Run inference smoke test
        run: python3 test-vllm-mlx.py --port 8770 --model mlx-community/Qwen3-8B-4bit

      - name: Cleanup
        if: always()
        run: |
          bash ~/model-router/uninstall-model-router.sh 2>/dev/null || rm -rf ~/model-router
